<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="920" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif" role="img">
  <title>JVM Internal Architecture</title>
  <desc>Detailed structural diagram of the Java Virtual Machine showing ClassLoader subsystem, Runtime Data Areas, Execution Engine, and Native Interface.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="920" fill="#ffffff"/>

  <!-- ===== OUTER JVM CONTAINER ===== -->
  <rect x="20" y="14" width="640" height="892" rx="16" fill="#f9f9f9" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="340" y="38" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">Java Virtual Machine (JVM)</text>

  <!-- ========== CLASS LOADER SUBSYSTEM ========== -->
  <rect x="36" y="50" width="608" height="170" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="56" y="74" font-size="14" font-weight="600" fill="#26215C">Class loader subsystem</text>
  <text x="56" y="90" font-size="12" fill="#534AB7">Loads, links, and initializes .class files at runtime</text>

  <!-- Loading -->
  <rect x="52" y="100" width="130" height="102" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.7"/>
  <text x="117" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">Loading</text>
  <text x="117" y="142" text-anchor="middle" font-size="11" fill="#3C3489">Bootstrap CL</text>
  <text x="117" y="158" text-anchor="middle" font-size="11" fill="#3C3489">Extension CL</text>
  <text x="117" y="174" text-anchor="middle" font-size="11" fill="#3C3489">Application CL</text>
  <text x="117" y="190" text-anchor="middle" font-size="11" fill="#3C3489">Custom CL</text>

  <!-- Linking -->
  <rect x="202" y="100" width="165" height="102" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.7"/>
  <text x="284" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">Linking</text>
  <text x="284" y="142" text-anchor="middle" font-size="11" fill="#3C3489">Verify (bytecode check)</text>
  <text x="284" y="158" text-anchor="middle" font-size="11" fill="#3C3489">Prepare (static fields)</text>
  <text x="284" y="174" text-anchor="middle" font-size="11" fill="#3C3489">Resolve (symbolic refs)</text>

  <!-- Initialization -->
  <rect x="387" y="100" width="243" height="102" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.7"/>
  <text x="508" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">Initialization</text>
  <text x="508" y="142" text-anchor="middle" font-size="11" fill="#3C3489">Run static initializers (&lt;clinit&gt;)</text>
  <text x="508" y="158" text-anchor="middle" font-size="11" fill="#3C3489">Assign static variables</text>
  <text x="508" y="174" text-anchor="middle" font-size="11" fill="#3C3489">Parent class initialized first</text>

  <!-- CL phase arrows -->
  <line x1="183" y1="151" x2="200" y2="151" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="368" y1="151" x2="385" y2="151" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ========== RUNTIME DATA AREAS ========== -->
  <rect x="36" y="238" width="608" height="322" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="56" y="262" font-size="14" font-weight="600" fill="#04342C">Runtime data areas</text>
  <text x="56" y="278" font-size="12" fill="#0F6E56">Memory regions managed by the JVM at runtime</text>

  <text x="340" y="300" text-anchor="middle" font-size="11" fill="#0F6E56">Shared across all threads</text>

  <!-- Heap -->
  <rect x="52" y="308" width="282" height="124" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.7"/>
  <text x="193" y="330" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Heap</text>
  <text x="193" y="348" text-anchor="middle" font-size="11" fill="#085041">Young generation</text>
  <text x="193" y="364" text-anchor="middle" font-size="11" fill="#085041">  Eden + Survivor (S0 / S1)</text>
  <text x="193" y="380" text-anchor="middle" font-size="11" fill="#085041">Old generation (Tenured)</text>
  <text x="193" y="396" text-anchor="middle" font-size="11" fill="#085041">Garbage collected by GC</text>
  <text x="193" y="412" text-anchor="middle" font-size="11" fill="#085041">Stores objects &amp; arrays</text>

  <!-- Method Area -->
  <rect x="354" y="308" width="276" height="124" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.7"/>
  <text x="492" y="330" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Method area (Metaspace)</text>
  <text x="492" y="348" text-anchor="middle" font-size="11" fill="#085041">Class metadata &amp; structures</text>
  <text x="492" y="364" text-anchor="middle" font-size="11" fill="#085041">Runtime constant pool</text>
  <text x="492" y="380" text-anchor="middle" font-size="11" fill="#085041">Field &amp; method data</text>
  <text x="492" y="396" text-anchor="middle" font-size="11" fill="#085041">Static variables</text>
  <text x="492" y="412" text-anchor="middle" font-size="11" fill="#085041">Native off-heap (Java 8+)</text>

  <text x="340" y="452" text-anchor="middle" font-size="11" fill="#0F6E56">Per-thread (each thread owns its own copy)</text>

  <!-- JVM Stack -->
  <rect x="52" y="462" width="156" height="84" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.7"/>
  <text x="130" y="484" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">JVM stack</text>
  <text x="130" y="502" text-anchor="middle" font-size="11" fill="#085041">Stack frames</text>
  <text x="130" y="518" text-anchor="middle" font-size="11" fill="#085041">Local vars, operand</text>
  <text x="130" y="534" text-anchor="middle" font-size="11" fill="#085041">stack, frame data</text>

  <!-- PC Register -->
  <rect x="224" y="462" width="152" height="84" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.7"/>
  <text x="300" y="484" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">PC register</text>
  <text x="300" y="502" text-anchor="middle" font-size="11" fill="#085041">Points to current</text>
  <text x="300" y="518" text-anchor="middle" font-size="11" fill="#085041">bytecode instruction</text>
  <text x="300" y="534" text-anchor="middle" font-size="11" fill="#085041">Undefined for native</text>

  <!-- Native Method Stack -->
  <rect x="394" y="462" width="236" height="84" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.7"/>
  <text x="512" y="484" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Native method stack</text>
  <text x="512" y="502" text-anchor="middle" font-size="11" fill="#085041">Supports native (C/C++) method</text>
  <text x="512" y="518" text-anchor="middle" font-size="11" fill="#085041">execution via JNI</text>
  <text x="512" y="534" text-anchor="middle" font-size="11" fill="#085041">Separate from JVM stack</text>

  <!-- ========== EXECUTION ENGINE ========== -->
  <rect x="36" y="578" width="608" height="192" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="56" y="602" font-size="14" font-weight="600" fill="#412402">Execution engine</text>
  <text x="56" y="618" font-size="12" fill="#854F0B">Interprets or compiles bytecode into native machine code</text>

  <!-- Interpreter -->
  <rect x="52" y="628" width="162" height="128" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.7"/>
  <text x="133" y="650" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">Interpreter</text>
  <text x="133" y="668" text-anchor="middle" font-size="11" fill="#633806">Reads bytecode</text>
  <text x="133" y="684" text-anchor="middle" font-size="11" fill="#633806">line by line</text>
  <text x="133" y="700" text-anchor="middle" font-size="11" fill="#633806">Slower but starts</text>
  <text x="133" y="716" text-anchor="middle" font-size="11" fill="#633806">immediately</text>
  <text x="133" y="732" text-anchor="middle" font-size="11" fill="#633806">No compilation</text>
  <text x="133" y="748" text-anchor="middle" font-size="11" fill="#633806">overhead</text>

  <!-- JIT Compiler -->
  <rect x="234" y="628" width="196" height="128" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.7"/>
  <text x="332" y="650" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">JIT compiler</text>
  <text x="332" y="668" text-anchor="middle" font-size="11" fill="#633806">Hotspot detection</text>
  <text x="332" y="684" text-anchor="middle" font-size="11" fill="#633806">C1 (client) compiler</text>
  <text x="332" y="700" text-anchor="middle" font-size="11" fill="#633806">C2 (server) compiler</text>
  <text x="332" y="716" text-anchor="middle" font-size="11" fill="#633806">Tiered compilation</text>
  <text x="332" y="732" text-anchor="middle" font-size="11" fill="#633806">Inline, loop unrolling</text>
  <text x="332" y="748" text-anchor="middle" font-size="11" fill="#633806">Deoptimization</text>

  <!-- GC -->
  <rect x="450" y="628" width="180" height="128" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.7"/>
  <text x="540" y="650" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">Garbage collector</text>
  <text x="540" y="668" text-anchor="middle" font-size="11" fill="#633806">Serial / Parallel GC</text>
  <text x="540" y="684" text-anchor="middle" font-size="11" fill="#633806">CMS / G1 GC</text>
  <text x="540" y="700" text-anchor="middle" font-size="11" fill="#633806">ZGC / Shenandoah</text>
  <text x="540" y="716" text-anchor="middle" font-size="11" fill="#633806">Mark, sweep, compact</text>
  <text x="540" y="732" text-anchor="middle" font-size="11" fill="#633806">Minor / major GC</text>
  <text x="540" y="748" text-anchor="middle" font-size="11" fill="#633806">Pause time tuning</text>

  <!-- ========== NATIVE METHOD INTERFACE (JNI) ========== -->
  <rect x="36" y="788" width="290" height="96" rx="12" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.8"/>
  <text x="56" y="812" font-size="14" font-weight="600" fill="#4A1B0C">Native method interface (JNI)</text>
  <text x="56" y="830" font-size="11" fill="#712B13">Bridges Java and native code</text>
  <text x="56" y="848" font-size="11" fill="#712B13">Allows Java to call C/C++/assembly</text>
  <text x="56" y="866" font-size="11" fill="#712B13">Platform-dependent interaction</text>

  <!-- ========== NATIVE METHOD LIBRARIES ========== -->
  <rect x="354" y="788" width="290" height="96" rx="12" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.8"/>
  <text x="374" y="812" font-size="14" font-weight="600" fill="#4A1B0C">Native method libraries</text>
  <text x="374" y="830" font-size="11" fill="#712B13">Platform-specific .so / .dll files</text>
  <text x="374" y="848" font-size="11" fill="#712B13">OS-level APIs (I/O, network)</text>
  <text x="374" y="866" font-size="11" fill="#712B13">Required by the execution engine</text>

  <!-- ========== FLOW ARROWS ========== -->
  <line x1="340" y1="220" x2="340" y2="236" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="560" x2="340" y2="576" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="190" y1="770" x2="190" y2="786" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="770" x2="490" y2="786" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="326" y1="836" x2="352" y2="836" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== LEGEND ========== -->
  <rect x="52" y="897" width="12" height="10" rx="2" fill="#CECBF6" stroke="#534AB7" stroke-width="0.7"/>
  <text x="70" y="907" font-size="11" fill="#333">Class loading</text>
  <rect x="162" y="897" width="12" height="10" rx="2" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.7"/>
  <text x="180" y="907" font-size="11" fill="#333">Memory</text>
  <rect x="252" y="897" width="12" height="10" rx="2" fill="#FAC775" stroke="#854F0B" stroke-width="0.7"/>
  <text x="270" y="907" font-size="11" fill="#333">Execution</text>
  <rect x="354" y="897" width="12" height="10" rx="2" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.7"/>
  <text x="372" y="907" font-size="11" fill="#333">Native interface</text>
</svg>
